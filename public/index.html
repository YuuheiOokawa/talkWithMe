<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>talkWithMe - 2人だけのチャット</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="landing">
    <h1>talkWithMe</h1>
    <p class="tagline">招待リンクを知る2人だけのプライベートチャット</p>

    <div id="pastRooms" class="past-rooms hidden">
      <h2>過去のチャット</h2>
      <ul id="pastRoomsList" class="room-list"></ul>
    </div>

    <div class="name-field">
      <label for="hostName">あなたの名前</label>
      <input id="hostName" type="text" maxlength="40" placeholder="例: たろう">
    </div>
    <button id="createBtn" class="btn-primary">新しいチャットルームを作成</button>
    <p class="note">作成後に表示される招待リンクを相手に送ってください。<br>リンクを知っている1人だけが参加できます。<br>ここで入力した名前を別の端末でも入力すると、同じ人として続きを開けます。</p>
  </div>
  <script src="/rooms-store.js"></script>
  <script>
    const BASE_TITLE = 'talkWithMe - 2人だけのチャット';

    // 未読件数を取得(その部屋の自分のトークンで、既読位置以降の相手発言だけを数える)
    async function fetchUnreadCount(room) {
      const saved = localStorage.getItem('twm:' + room.token);
      if (!saved) return 0;
      let session;
      try { session = JSON.parse(saved); } catch { return 0; }
      if (!session.userToken) return 0;
      try {
        const res = await fetch(
          `/api/rooms/${room.token}/messages?since=${room.lastReadId || 0}&user=${encodeURIComponent(session.userToken)}`
        );
        if (!res.ok) return 0;
        const data = await res.json();
        return data.messages.filter((m) => m.participantId !== session.participantId).length;
      } catch {
        return 0;
      }
    }

    function updateTitleBadge() {
      let total = 0;
      document.querySelectorAll('.room-badge:not(.hidden)').forEach((b) => {
        total += parseInt(b.textContent, 10) || 0;
      });
      document.title = total > 0 ? `(${total}) ${BASE_TITLE}` : BASE_TITLE;
    }

    function renderPastRooms() {
      const rooms = window.TwmRooms.getRooms();
      const wrap = document.getElementById('pastRooms');
      const list = document.getElementById('pastRoomsList');
      if (rooms.length === 0) {
        wrap.classList.add('hidden');
        return;
      }
      list.innerHTML = '';
      rooms.forEach((r) => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.className = 'room-item';
        a.href = '/room/' + r.token;

        const role = document.createElement('span');
        role.className = 'room-role';
        const kind = r.role === 'host' ? '自分が作成' : '招待された';
        role.textContent = r.name ? `${r.name}（${kind}）` : `${kind}チャット`;

        const meta = document.createElement('span');
        meta.className = 'room-meta';
        const badge = document.createElement('span');
        badge.className = 'room-badge hidden';
        const date = document.createElement('span');
        date.className = 'room-date';
        date.textContent = new Date(r.lastVisitedAt).toLocaleString('ja-JP', {
          month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit',
        });
        meta.appendChild(badge);
        meta.appendChild(date);

        a.appendChild(role);
        a.appendChild(meta);
        li.appendChild(a);
        list.appendChild(li);

        fetchUnreadCount(r).then((count) => {
          if (count > 0) {
            badge.textContent = count > 99 ? '99+' : String(count);
            badge.classList.remove('hidden');
            li.classList.add('has-unread');
          }
          updateTitleBadge();
        });
      });
      wrap.classList.remove('hidden');
    }
    renderPastRooms();

    const hostNameInput = document.getElementById('hostName');
    hostNameInput.value = localStorage.getItem('twm:myname') || '';

    document.getElementById('createBtn').addEventListener('click', async () => {
      const name = hostNameInput.value.trim();
      if (!name) {
        alert('お名前を入力してください');
        hostNameInput.focus();
        return;
      }
      const btn = document.getElementById('createBtn');
      btn.disabled = true;
      try {
        const res = await fetch('/api/rooms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'ルーム作成に失敗しました');
        localStorage.setItem('twm:' + data.inviteToken, JSON.stringify({
          userToken: data.userToken,
          participantId: data.participantId,
          role: data.role,
          displayName: data.displayName,
        }));
        localStorage.setItem('twm:myname', name);
        window.TwmRooms.upsertRoom({ token: data.inviteToken, role: data.role, name: data.displayName });
        location.href = data.roomUrl;
      } catch (e) {
        alert('ルーム作成に失敗しました: ' + e.message);
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
